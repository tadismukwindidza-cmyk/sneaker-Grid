<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Shoes Grid 👟</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- Header -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <span class="header-eyebrow">Premium Collection 2026</span>
      <h1 class="header-title">3D SHOES GRID <span class="emoji">👟</span></h1>
      <p class="header-sub">Hover to explore · Click to own</p>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="runner">Runner</button>
      <button class="filter-btn" data-filter="hightop">High-Top</button>
      <button class="filter-btn" data-filter="low">Low-Top</button>
      <button class="filter-btn" data-filter="collab">Collab</button>
      <button class="filter-btn" data-filter="heritage">Heritage</button>
    </div>
  </header>

  <!-- Grid -->
  <main class="grid-wrapper" id="gridWrapper">
    <div class="sneaker-grid" id="sneakerGrid"></div>
  </main>

  <!-- Focus overlay -->
  <div class="focus-overlay" id="focusOverlay">
    <div class="focus-card" id="focusCard">
      <button class="focus-close" id="focusClose">✕</button>
      <div class="focus-shoe" id="focusShoe"></div>
      <div class="focus-info">
        <p class="focus-brand" id="focusBrand">Nike</p>
        <h2 class="focus-name" id="focusName">Air Max 95</h2>
        <p class="focus-desc" id="focusDesc">Engineered for the streets, built for the culture.</p>
        <div class="focus-meta">
          <span class="focus-price" id="focusPrice">$189</span>
          <span class="focus-tag" id="focusTag">Runner</span>
        </div>
        <button class="buy-btn" id="buyBtn">Buy Now →</button>
      </div>
    </div>
  </div>

  <!-- Tooltip -->
  <div class="tooltip" id="tooltip">
    <span class="tooltip-name" id="tooltipName">Air Max 95</span>
    <span class="tooltip-price" id="tooltipPrice">$189</span>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
